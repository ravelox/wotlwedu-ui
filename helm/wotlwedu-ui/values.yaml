replicaCount: 2
environment: ""

image:
  repository: wotlwedu-ui
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80

resources: {}

affinity: {}
nodeSelector: {}
tolerations: []

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: ui.wotlwedu.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wotlwedu-ui-tls
      hosts:
        - ui.wotlwedu.com

nginx:
  defaultServerConfig: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }

environments: {}
