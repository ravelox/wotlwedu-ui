apiVersion: apps/v1
kind: Deployment
metadata:
  name: wotlwedu-ui
  labels:
    app.kubernetes.io/name: wotlwedu-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wotlwedu-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wotlwedu-ui
    spec:
      containers:
        - name: wotlwedu-ui
          image: wotlwedu-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: wotlwedu-ui-nginx
