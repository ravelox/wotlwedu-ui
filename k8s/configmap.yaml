apiVersion: v1
kind: ConfigMap
metadata:
  name: wotlwedu-ui-nginx
  labels:
    app.kubernetes.io/name: wotlwedu-ui
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
